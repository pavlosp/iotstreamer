[supervisord]
nodaemon=true
user=root

[program:dbus]
command=/usr/bin/dbus-daemon --system --nofork --nopidfile
autostart=true
autorestart=true
priority=1

[program:avahi]
command=/usr/sbin/avahi-daemon --no-drop-root
autostart=true
autorestart=true
priority=5

[program:nqptp]
command=/usr/local/bin/nqptp
autostart=true
autorestart=true
priority=10

[program:pulseaudio]
command=/usr/bin/pulseaudio --daemonize=no --disallow-exit --exit-idle-time=-1
autostart=true
autorestart=true
priority=10
startretries=3
startsecs=2
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:shairport-sync]
command=/usr/local/bin/shairport-sync -a "%(ENV_SOUND_DEVICE_NAME)s" --output alsa -- -d pulse
autostart=true
autorestart=true
priority=20
startretries=3
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
